<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organization ID - Sky Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
        }

        .container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .id-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 3rem 2.5rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.8s ease-in-out;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
            font-weight: 800;
        }

        .header p {
            color: #6b7280;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .input-with-icon input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-with-icon input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .primary-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
        }

        .secondary-btn {
            background: #f3f4f6;
            color: #374151;
        }

        .secondary-btn:hover {
            background: #e5e7eb;
        }

        .error-message {
            display: none;
            margin-top: 1rem;
            padding: 12px;
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            border-radius: 8px;
            color: #991b1b;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            .id-card { padding: 2rem 1.5rem; }
            .header h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="id-card">
            <div class="header">
                <div class="header-icon">
                    <i class="fas fa-building"></i>
                </div>
                <h1>Enter Organization ID</h1>
                <p>Please enter your unique organization identifier</p>
            </div>

            <form id="org-id-form" onsubmit="validateOrgId(event)">
                <div class="input-group">
                    <label for="org-id">Organization ID</label>
                    <div class="input-with-icon">
                        <i class="fas fa-id-card"></i>
                        <input type="text" id="org-id" placeholder="e.g., ORG-12345" required>
                    </div>
                </div>

                <button type="submit" class="btn primary-btn">
                    <i class="fas fa-arrow-right"></i> Continue
                </button>

                <button type="button" class="btn secondary-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Back
                </button>

                <div class="error-message" id="error-message">
                    <i class="fas fa-exclamation-circle"></i> Invalid Organization ID. Please try again.
                </div>
            </form>
        </div>
    </div>

    <script>
        function validateOrgId(event) {
            event.preventDefault();
            
            const orgIdInput = document.getElementById('org-id');
            const orgCode = orgIdInput.value.trim().toUpperCase();
            const errorMessage = document.getElementById('error-message');

            fetch(`http://127.0.0.1:5000/api/org/by-code/${orgCode}`)
                .then(r => r.json())
                .then(data => {
                    if (data.id) {
                        localStorage.setItem('organizationId', data.id);
                        localStorage.setItem('organizationName', data.name);
                        localStorage.setItem('organizationCode', orgCode);
                        window.location.href = 'organization-role.html';
                    } else {
                        errorMessage.classList.add('show');
                        orgIdInput.value = '';
                        setTimeout(() => errorMessage.classList.remove('show'), 3000);
                    }
                })
                .catch(() => {
                    errorMessage.classList.add('show');
                    orgIdInput.value = '';
                    setTimeout(() => errorMessage.classList.remove('show'), 3000);
                });
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
